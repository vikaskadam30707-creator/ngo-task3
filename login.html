<!DOCTYPE html>
<html>

<head>

<title>NGO Login</title>

<link rel="stylesheet" href="/static/style.css">


<style>

body{

height:100vh;
margin:0;

display:flex;
justify-content:center;
align-items:center;

background:linear-gradient(135deg,#00c6ff,#0072ff);

font-family:'Segoe UI';

overflow:hidden;

}



.login-box{

width:380px;

padding:40px;

background:rgba(255,255,255,.2);

backdrop-filter:blur(15px);

border-radius:30px;

box-shadow:0 20px 50px #0005;

animation:show 1s;

}




@keyframes show{

from{

opacity:0;

transform:scale(.5);

}

to{

opacity:1;

transform:scale(1);

}

}




.logo{

font-size:70px;

text-align:center;

animation:rotate 3s infinite linear;

}



@keyframes rotate{

from{
transform:rotate(0deg);
}

to{
transform:rotate(360deg);
}

}





h1{

text-align:center;

color:white;

}





input{

width:90%;

padding:15px;

margin:12px;

border:none;

border-radius:25px;

outline:none;

}



button{


width:100%;

padding:15px;

border:none;

border-radius:25px;

background:white;

color:#0072ff;

font-size:18px;

cursor:pointer;

transition:.4s;

}



button:hover{

transform:scale(1.08);

}





p{

text-align:center;

color:white;

}



a{

color:white;

}



.circle{

position:absolute;

border-radius:50%;

background:#ffffff40;

animation:float 6s infinite;

}



.c1{

width:200px;

height:200px;

top:10%;

left:10%;

}



.c2{

width:150px;

height:150px;

bottom:10%;

right:10%;

}



@keyframes float{

50%{

transform:translateY(-40px);

}

}



</style>


</head>



<body>


<div class="circle c1"></div>

<div class="circle c2"></div>



<div class="login-box">



<div class="logo">
🌍
</div>



<h1>
NGO Login
</h1>




<form method="POST">



<input

type="email"

name="email"

placeholder="Enter Email"

required>




<input

type="password"

name="password"

placeholder="Enter Password"

required>





<button>

🔐 Login

</button>




</form>




<p>

New User?

<a href="/register">

Register Here

</a>

</p>



</div>



</body>


</html>
