<!DOCTYPE html>
<html>
<head>
<title>Contact NGO</title>

<style>

body{
margin:0;
height:100vh;
display:flex;
justify-content:center;
align-items:center;
font-family:'Segoe UI';
background:linear-gradient(135deg,#11998e,#38ef7d);
overflow:hidden;
}

.circle{
position:absolute;
border-radius:50%;
background:#ffffff40;
animation:float 6s infinite;
}

.c1{
width:220px;
height:220px;
top:5%;
left:5%;
}

.c2{
width:180px;
height:180px;
bottom:5%;
right:5%;
animation-delay:2s;
}

@keyframes float{
50%{
transform:translateY(-50px);
}
}

.contact-box{
width:500px;
padding:40px;
background:rgba(255,255,255,.2);
backdrop-filter:blur(20px);
border-radius:30px;
text-align:center;
box-shadow:0 20px 50px #0005;
}

h1{
color:white;
margin-bottom:20px;
}

p{
color:white;
font-size:20px;
margin:15px;
}

button{
padding:12px 30px;
border:none;
border-radius:25px;
background:white;
color:#11998e;
font-size:18px;
cursor:pointer;
transition:.3s;
}

button:hover{
transform:scale(1.1);
}

a{
text-decoration:none;
}

</style>
</head>

<body>

<div class="circle c1"></div>
<div class="circle c2"></div>

<div class="contact-box">

<h1>📞 Contact Us</h1>

<p>📧 Email: ngohelp@gmail.com</p>

<p>📱 Phone: +91 7666900644</p>

<p>📍 Address: Pune, Maharashtra, India</p>

<a href="/">
<button>🏠 Home</button>
</a>

</div>

</body>
</html>
