<!DOCTYPE html>

<html>

<head>

<title>About NGO</title>

<link rel="stylesheet" href="/static/style.css">


<style>


body{

margin:0;

height:100vh;

display:flex;

justify-content:center;

align-items:center;

font-family:'Segoe UI';

background:linear-gradient(135deg,#11998e,#38ef7d);

overflow:hidden;

}




.circle{

position:absolute;

border-radius:50%;

background:#ffffff40;

animation:float 6s infinite;

}



.c1{

width:220px;

height:220px;

top:5%;

left:5%;

}



.c2{

width:180px;

height:180px;

bottom:5%;

right:5%;

animation-delay:2s;

}



@keyframes float{


50%{

transform:translateY(-50px);

}

}






.about-box{


width:700px;

padding:40px;


background:rgba(255,255,255,.2);

backdrop-filter:blur(20px);


border-radius:35px;


box-shadow:0 25px 60px #0005;


animation:open 1s;


}




@keyframes open{


from{

opacity:0;

transform:scale(.5);

}


to{

opacity:1;

transform:scale(1);

}


}




img{


width:150px;

height:150px;

border-radius:50%;


display:block;

margin:auto;


animation:pulse 2s infinite;


}



@keyframes pulse{


50%{

transform:scale(1.1);

}


}





h1{

text-align:center;

font-size:45px;

color:white;

}




h2{

color:white;

margin-top:25px;

}



p{

color:white;

font-size:18px;

line-height:1.6;

}




button{


padding:12px 35px;

border:none;

border-radius:25px;


background:white;

color:#11998e;


font-size:18px;


cursor:pointer;


transition:.3s;


}



button:hover{

transform:scale(1.1);

}





</style>


</head>



<body>



<div class="circle c1"></div>

<div class="circle c2"></div>




<div class="about-box">



<img src="https://cdn-icons-png.flaticon.com/512/2830/2830284.png">



<h1>

🌍 About NGO

</h1>




<h2>

Our Story

</h2>


<p>

{{data[1]}}

</p>




<h2>

⭐ Core Values

</h2>


<p>

{{data[2]}}

</p>




<h2>

🚀 Programs

</h2>


<p>

{{data[3]}}

</p>




<h2>

👥 Team Members

</h2>


<p>

{{data[4]}}

</p>



<a href="/">

<button>

🏠 Home

</button>

</a>



</div>



</body>


</html>
